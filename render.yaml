services:
  - type: web
    name: student-risk-predictor
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install --no-cache-dir --only-binary=:all: -r requirements.txt
    startCommand: streamlit run app/dashboard_indian.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
